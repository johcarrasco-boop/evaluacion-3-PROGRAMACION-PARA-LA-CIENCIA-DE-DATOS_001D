services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: python etl/run_etl.py --project-root /app --api-url http://api:8000/business-rules
    volumes:
      - ./data:/app/data
    depends_on:
      - api

  ml:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: python models/train_models.py --project-root /app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - etl

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env.example
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - ml
